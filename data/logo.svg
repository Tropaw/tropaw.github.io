<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Books stack -->
  <!-- Bottom book (dark brown) -->
  <rect x="15" y="72" width="70" height="10" rx="2" fill="#5c3d1e"/>
  <rect x="15" y="72" width="8" height="10" rx="1" fill="#7a5230"/>
  <!-- Middle book (medium brown) -->
  <rect x="18" y="63" width="64" height="10" rx="2" fill="#8B4513"/>
  <rect x="18" y="63" width="8" height="10" rx="1" fill="#a0522d"/>
  <!-- Top book (lighter brown) -->
  <rect x="20" y="55" width="60" height="10" rx="2" fill="#a0522d"/>
  <rect x="20" y="55" width="8" height="10" rx="1" fill="#cd853f"/>

  <!-- Flame - outer (orange) -->
  <path d="M50 54
    C50 54 35 45 38 30
    C38 30 40 38 44 36
    C44 36 36 22 45 10
    C45 10 44 24 52 26
    C52 26 48 18 55 14
    C55 14 52 26 60 28
    C60 28 68 20 65 34
    C65 34 70 30 68 38
    C68 38 72 46 58 54
    Z"
    fill="#FF6B00"/>

  <!-- Flame - inner (yellow) -->
  <path d="M50 52
    C50 52 40 45 42 34
    C42 34 44 40 47 38
    C47 38 42 28 49 20
    C49 20 48 30 53 32
    C53 32 50 26 56 23
    C56 23 54 32 60 34
    C60 34 64 42 56 52
    Z"
    fill="#FFB800"/>

  <!-- Flame - core (bright yellow) -->
  <path d="M50 50
    C50 50 44 44 46 37
    C46 37 48 42 50 40
    C50 40 52 34 55 36
    C55 36 58 42 54 50
    Z"
    fill="#FFE033"/>

  <!-- Eyes -->
  <circle cx="44" cy="36" r="3" fill="white"/>
  <circle cx="56" cy="34" r="3" fill="white"/>
  <circle cx="45" cy="36" r="1.5" fill="#1a1a1a"/>
  <circle cx="57" cy="34" r="1.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="45.5" cy="35.5" r="0.5" fill="white"/>
  <circle cx="57.5" cy="33.5" r="0.5" fill="white"/>

  <!-- Small smile -->
  <path d="M47 42 Q50 45 53 42" stroke="#cc4400" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
